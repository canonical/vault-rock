name: vault
base: bare
build-base: ubuntu@24.04
version: "1.19.5"
summary: A ROCK container image for Vault
description: |
  A ROCK container image for Vault, a tool for secrets management, encryption as a service, and privileged access management.
license: Apache-2.0
platforms:
  amd64:
  arm64:

services:
  vault:
    command: vault server [ -config=/vault/config/config.hcl ]
    override: replace
    startup: enabled

package-repositories:
 - type: apt
   url: https://deb.nodesource.com/node_20.x
   components: [main]
   suites: [nodistro]
   key-id: 6F71F525282841EEDAF851B42F59B5F99B1BE0B4
 - type: apt
   url: https://dl.yarnpkg.com/debian/
   components: [main]
   suites: [stable]
   key-id: FF7CB5667B542092084BBDC562D54FD4003F6525

parts:

  vault:
    plugin: go
    go-buildtags:
      - vault
      - ui
    source: https://github.com/hashicorp/vault.git
    source-tag: v1.19.5
    source-type: git
    source-depth: 1
    stage:
      - bin/vault
    build-snaps:
      - go/1.24/stable
    build-packages:
      - nodejs
      - yarn
    override-build: |
      make static-dist
      craftctl default
      strip -s $CRAFT_PART_INSTALL/bin/*

  default-config:
    plugin: dump
    source: ./config
    organize:
      config.hcl: /vault/config/config.hcl

  packages:
    plugin: nil
    stage-packages:
      - ca-certificates_data
      - libc6_libs
      - base-files_lib

  deb-security-manifest:
    after:
      - packages
    plugin: make
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: gen_manifest
