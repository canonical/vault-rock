name: vault
base: bare
build-base: ubuntu@24.04
version: "2.0.0"
summary: A ROCK container image for Vault
description: |
  A ROCK container image for Vault, a tool for secrets management, encryption as a service, and privileged access management.
license: Apache-2.0
platforms:
  amd64:
  arm64:
  s390x:

services:
  vault:
    command: vault server [ -config=/vault/config/config.hcl ]
    override: replace
    startup: enabled

package-repositories:
 - type: apt
   architectures: [amd64, arm64]
   url: https://deb.nodesource.com/node_20.x
   components: [main]
   suites: [nodistro]
   key-id: 6F71F525282841EEDAF851B42F59B5F99B1BE0B4

parts:

  vault:
    plugin: go
    go-buildtags:
      - vault
    source: https://github.com/hashicorp/vault.git
    source-tag: v2.0.0
    source-type: git
    source-depth: 1
    stage:
      - bin/vault
    build-snaps:
      - go/1.26/stable
    build-packages:
      - nodejs
    override-build: |
      # Build the web UI on architectures where Node 20 is available.
      # s390x does not have Node 20 packages (NodeSource does not support s390x),
      # so the UI is excluded on that platform. Vault remains fully functional
      # via the CLI and HTTP API without the embedded web UI.
      if [ "${CRAFT_TARGET_ARCH}" != "s390x" ]; then
        npm install -g pnpm yarn
        make static-dist
        GOTAGS="vault,ui"
      else
        GOTAGS="vault"
      fi
      CGO_ENABLED=0 go build -tags "${GOTAGS}" -o "${CRAFT_PART_INSTALL}/bin/vault" .
      strip -s $CRAFT_PART_INSTALL/bin/*

  default-config:
    plugin: dump
    source: ./config
    organize:
      config.hcl: /vault/config/config.hcl

  packages:
    plugin: nil
    stage-packages:
      - ca-certificates_data
      - libc6_libs
      - base-files_lib

  deb-security-manifest:
    after:
      - packages
    plugin: make
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: gen_manifest
