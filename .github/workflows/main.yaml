name: Protected Branches

on:
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*
  schedule:
    - cron: '0 8 * * 2'

concurrency:
    group: ${{ github.ref == 'refs/heads/main' && format('ignore-main-{0}', github.run_id) || format('{0}-{1}', github.workflow, github.ref_name) }}
    cancel-in-progress: true

jobs:

  build:
    uses: canonical/identity-credentials-workflows/.github/workflows/build-rock-multiarch.yaml@v1

  prepare-scan:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: rock-amd64
      - uses: actions/upload-artifact@v7
        with:
          name: rock
          path: "*.rock"

  scan:
    needs: prepare-scan
    uses: canonical/identity-credentials-workflows/.github/workflows/scan-rock.yaml@v1

  integration-tests:
    needs: build
    uses: ./.github/workflows/integration-tests.yaml

  publish:
    if: github.ref_name == 'main' || startsWith(github.ref_name, 'release-')
    needs: [scan, build, integration-tests]
    uses: canonical/identity-credentials-workflows/.github/workflows/publish-rock-multiarch.yaml@v1
